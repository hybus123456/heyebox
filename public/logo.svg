<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a1a1aa"/>
      <stop offset="100%" stop-color="#71717a"/>
    </linearGradient>
    <linearGradient id="stem" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#71717a"/>
      <stop offset="100%" stop-color="#52525b"/>
    </linearGradient>
  </defs>
  
  <!-- 荷叶 - 几何简约风格 -->
  <ellipse cx="60" cy="48" rx="38" ry="32" fill="none" stroke="url(#leaf)" stroke-width="2.5"/>
  
  <!-- 叶脉 - 极简线条 -->
  <line x1="60" y1="48" x2="60" y2="22" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="48" x2="38" y2="30" stroke="#a1a1aa" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="60" y1="48" x2="82" y2="30" stroke="#a1a1aa" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="60" y1="48" x2="32" y2="48" stroke="#a1a1aa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="60" y1="48" x2="88" y2="48" stroke="#a1a1aa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  
  <!-- 茎 -->
  <path d="M60 80 Q58 90 56 100" stroke="url(#stem)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- 水珠 - 圆形点缀 -->
  <circle cx="46" cy="40" r="3" fill="#d4d4d8" opacity="0.6"/>
  <circle cx="45" cy="39" r="1" fill="#e4e4e7" opacity="0.8"/>
</svg>
